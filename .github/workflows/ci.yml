name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libbz2-dev \
            liblzma-dev \
            libcurl4-openssl-dev \
            zlib1g-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"
          python -m pip install build

      - name: Build vendored backend
        run: |
          cmake -S . -B build-wsl
          cmake --build build-wsl --parallel

      - name: Run Python tests
        run: |
          HAPTOOLS_CPP_BIN=$PWD/build-wsl/haptools_cpp python -m pytest -q tests/python

      - name: Run C++ tests
        run: |
          ctest --test-dir build-wsl --output-on-failure

      - name: Build source distribution
        run: |
          python -m build --sdist

      - name: Smoke test install from sdist
        run: |
          REPO_ROOT=$PWD
          TMP_DIR=$(mktemp -d)
          python -m venv "$TMP_DIR/.venv-sdist-smoke"
          source "$TMP_DIR/.venv-sdist-smoke/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install "$REPO_ROOT"/dist/*.tar.gz
          cd "$TMP_DIR"
          python -c "from pathlib import Path; import haptools; assert (Path(haptools.__file__).resolve().parent / '_bin' / 'haptools_cpp').exists()"
          haptools view "$REPO_ROOT/inst/extdata/var.sorted.vcf.gz" -r scaffold_1:4300-5000 --output-file smoke_out
          python -c "from pathlib import Path; assert (Path('smoke_out') / 'hapresult.tsv').exists(); assert (Path('smoke_out') / 'hap_summary.tsv').exists()"
